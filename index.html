<style>
  :root{
    --ink: #10141a;
    --panel: #1a2029;
    --rule: #262d38;
    --paper: #eef1f3;
    --paper-dim: #a7afb8;
    --muted: #7c8896;
    --brass: #7fb8c4;
    --brass-dim: #5c8e98;
    --teal: #6fb8a8;
    --rose: #c97b94;

    --c-abonnementen: #6fb8a8;
    --c-reizen: #c98f5e;
    --c-vervoer: #7c93c4;
    --c-shopping: #c98577;
    --c-kleding: #a68bc9;
    --c-wonen: #7fae8a;
    --c-entertainment: #cfa963;
    --c-bankkosten: #8b96a3;
    --c-persoonlijk: #c17c9c;
    --c-zakelijk: #5f7fb0;
    --c-eten: #c39a5c;
    --c-goededoelen: #5fa898;
    --c-overig: #8f8d86;
    --c-hypotheek: #ab7c4f;
    --c-verzekeringen: #6a94c9;
    --c-nuts: #6fab8f;
    --c-telecom: #9585c4;
    --c-auto: #bd8256;
    --c-italie: #bf6f5e;
    --c-vakbond: #93a464;
    --c-educatie: #c39bc2;
    --c-verzorging: #cbb173;
    --c-kids: #6fa8c9;
    --c-boodschappen: #a3ba6e;
    --c-familie: #b98bbd;
    --c-cadeaus: #cf9d5e;
    --c-sparen: #5ea3b8;
    --c-onbekend: #b8705f;
  }

  *{ box-sizing: border-box; }
  html,body{ overflow-x: hidden; max-width: 100vw; }
  html,body{ margin:0; padding:0; background: var(--ink); }
  body{
    font-family: 'Inter', sans-serif;
    color: var(--paper);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .app{ max-width: 1000px; margin: 0 auto; }

  header{
    display:flex; align-items:flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 20px;
    margin-bottom: 20px;
    padding-bottom: 20px;
  }
  .brand-eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 8px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 40px;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .view-toggle{ display:flex; gap:4px; margin-bottom: 28px; border-bottom: 1px solid var(--rule); }
  .view-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12.5px;
    background: transparent; border: none;
    color: var(--muted);
    padding: 10px 4px; margin-right: 22px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transform: translateY(1px);
  }
  .view-btn.active{ color: var(--paper); border-bottom-color: var(--brass); }
  [data-filter-cat]:active, [data-filter-src]:active{ background: rgba(127,184,196,0.15) !important; transform: scale(0.98); }
  .card[data-filter-cat], .card[data-filter-src]{ transition: background .1s ease, transform .1s ease; }
  li[data-filter-cat], li[data-filter-src]{ transition: background .1s ease; border-radius: 4px; padding-left: 4px; margin-left: -4px; }

  .month-tabs{ display:flex; gap: 4px; flex-wrap: wrap; }
  .month-tab{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12.5px;
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--muted);
    padding: 8px 13px;
    border-radius: 3px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .month-tab:hover{ border-color: var(--brass-dim); color: var(--paper); }
  .month-tab.active{ background: var(--brass); border-color: var(--brass); color: #10141a; font-weight: 500; }

  .hero{ display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .hero4{ display:grid; grid-template-columns: repeat(5,1fr); gap: 14px; margin-bottom: 20px; }
  @media (max-width: 900px){ .hero4{ grid-template-columns: 1fr 1fr 1fr; } }
  @media (max-width: 720px){ .hero{ grid-template-columns: 1fr; } .hero4{ grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px){
    body{ padding: 16px 10px 50px; }
    h1{ font-size: 24px; }
    .brand-eyebrow{ font-size: 9px; }
    .hero4{ grid-template-columns: 1fr; gap: 8px; }
    .card{ padding: 14px; }
    .card-label{ font-size: 10px; letter-spacing: 0.08em; }
    .total-figure{ font-size: 28px; }
    .stat-figure{ font-size: 24px; white-space: normal; }
    .stat-sub{ font-size: 10px; }
    .view-toggle{ overflow-x: auto; white-space: nowrap; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; margin-bottom: 20px; }
    .view-btn{ margin-right: 12px; font-size: 11px; padding: 8px 2px; }
    .month-tabs{ overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    .donut-wrap{ flex-direction: column; align-items: flex-start; gap: 14px; }
    .donut{ width: 100px; height: 100px; }
    .legend .name{ font-size: 12px; }
    .legend .amt{ font-size: 11px; }
    .ledger-row{ flex-wrap: wrap; row-gap: 4px; font-size: 12.5px; align-items: baseline; }
    .lr-date{ flex: 0 0 auto; order: 1; font-size: 10px; margin-right: 6px; }
    .lr-tag{ order: 2; font-size: 9px; padding: 2px 5px; }
    .lr-amt{ order: 3; margin-left: auto; min-width: auto; font-size: 13px; font-weight: 600; }
    .lr-vendor{ flex: 1 1 100%; order: 4; white-space: normal; font-size: 12.5px; margin-top: 2px; }
    .lr-leader{ display: none; }
    .lr-src{ order: 5; font-size: 8.5px; margin-top: 2px; }
    .lr-btw{ order: 6; font-size: 8px; margin-top: 2px; }
    .card-label{ flex-wrap: wrap; gap: 4px; }
    .note-card{ font-size: 11.5px; }
    footer{ font-size: 11px; }
  }

  .card{ background: var(--panel); border: 1px solid var(--rule); border-radius: 6px; padding: 24px; }
  .card-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px;
  }
  .stat-figure{ font-family:'Space Grotesk', sans-serif; font-weight: 500; font-size: 30px; line-height:1; }
  .stat-figure.pos{ color: var(--teal); }
  .stat-figure.neg{ color: var(--rose); }
  .stat-sub{ margin-top:8px; font-family:'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--muted); }

  .total-card{ display:flex; flex-direction:column; justify-content: space-between; }
  .total-figure{ font-family:'Space Grotesk', sans-serif; font-weight: 500; font-size: 46px; line-height: 1; letter-spacing: -0.01em; }
  .total-delta{ margin-top: 10px; font-family:'IBM Plex Mono', monospace; font-size: 13px; }
  .total-delta.up{ color: var(--rose); }
  .total-delta.down{ color: var(--teal); }
  .total-sub{
    margin-top: 20px; padding-top: 18px; border-top: 1px dashed var(--rule);
    display:flex; justify-content: space-between;
    font-family:'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--muted);
  }
  .total-sub b{ color: var(--paper); font-weight: 500; }

  .donut-wrap{ display:flex; align-items:center; gap: 22px; }
  .donut{ position: relative; width: 132px; height: 132px; flex: 0 0 auto; border-radius: 50%; }
  .donut-hole{ position:absolute; inset: 20px; background: var(--panel); border-radius: 50%; display:flex; align-items:center; justify-content:center; flex-direction: column; }
  .donut-hole span{ font-family:'IBM Plex Mono', monospace; font-size: 9.5px; color: var(--muted); text-transform:uppercase; letter-spacing: .08em;}
  .donut-hole b{ font-family:'Space Grotesk', sans-serif; font-size: 16px; font-weight: 500; margin-top:2px; }

  .legend{ list-style:none; margin:0; padding:0; flex:1; min-width:0; }
  .legend li{ display:flex; align-items:center; gap: 9px; font-size: 12.5px; padding: 4px 0; }
  .legend .dot{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .legend .name{ color: var(--paper); flex: 1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .legend .amt{ font-family:'IBM Plex Mono', monospace; color: var(--muted); font-size: 11.5px;}

  .trend-card{ margin-bottom: 20px; }
  .trend-card svg{ display:block; width:100%; height:auto; overflow: visible; }
  .trend-labels{ display:flex; justify-content: space-between; font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 6px; padding: 0 4px; }

  .ledger-card .card-label{ display:flex; justify-content: space-between; align-items: baseline;}
  .ledger-count{ color: var(--paper-dim); }
  .ledger-list{ list-style:none; margin:0; padding:0; }
  .ledger-row{ display:flex; align-items: baseline; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--rule); font-size: 13.5px; }
  .ledger-row:last-child{ border-bottom: none; }
  .lr-date{ font-family:'IBM Plex Mono', monospace; color: var(--muted); font-size: 11.5px; flex: 0 0 56px; }
  .lr-src{
    flex: 0 0 auto; font-family:'IBM Plex Mono', monospace; font-size: 9px; letter-spacing:.05em;
    padding: 2px 5px; border-radius: 2px; border:1px solid var(--rule); color: var(--muted);
  }
  .lr-vendor{ flex: 0 1 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lr-tag{
    flex: 0 0 auto; font-family:'IBM Plex Mono', monospace; font-size: 10px; letter-spacing:.04em;
    padding: 2px 6px; border-radius: 2px; color: var(--ink); font-weight: 600; white-space: nowrap;
  }
  .lr-tag-select{
    flex: 0 0 auto; font-family:'IBM Plex Mono', monospace; font-size: 10px; letter-spacing:.04em;
    padding: 2px 18px 2px 6px; border-radius: 2px; color: var(--ink); font-weight: 600; white-space: nowrap;
    border: none; appearance: none; -webkit-appearance: none; cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='8'><path d='M1 2 L4 6 L7 2' stroke='%2310141a' stroke-width='1.4' fill='none'/></svg>");
    background-repeat: no-repeat; background-position: right 5px center;
  }
  .lr-tag-select:focus{ outline: 2px solid var(--brass); outline-offset: 1px; }
  .lr-leader{ flex: 1 1 auto; border-bottom: 1px dotted var(--rule); margin: 0 6px; min-width: 16px; transform: translateY(-4px);}
  .lr-btw{ flex: 0 0 auto; font-family:'IBM Plex Mono', monospace; font-size: 9px; border: 1px solid var(--brass-dim); color: var(--brass); border-radius: 20px; padding: 2px 7px; letter-spacing: .03em; }
  .lr-amt{ flex: 0 0 auto; font-family:'IBM Plex Mono', monospace; font-size: 13.5px; min-width: 76px; text-align:right; }
  .lr-amt.neg{ color: var(--teal); }
  .lr-amt.pos-income{ color: var(--teal); }

  .note-card{ font-size: 12.5px; color: var(--muted); line-height: 1.6; margin-bottom: 20px; }
  .budget-compare-header, .budget-compare-row{
    display: grid; grid-template-columns: 1.6fr 1fr 1fr 1fr; gap: 6px; align-items: baseline;
    padding: 8px 0; border-bottom: 1px solid var(--rule);
  }
  .budget-compare-header{
    font-family:'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
  }
  .budget-compare-header span:not(:first-child), .bc-val{ text-align: right; font-family:'IBM Plex Mono', monospace; font-size: 12.5px; }
  .bc-naam{ font-size: 13px; }
  @media (max-width: 480px){
    .budget-compare-header, .budget-compare-row{ grid-template-columns: 1fr; gap: 2px; padding: 8px 0; }
    .budget-compare-header span:not(:first-child){ display: none; }
    .bc-naam{ font-weight: 600; margin-bottom: 2px; }
    .bc-val{ text-align: left; font-size: 12px; color: var(--muted); }
    .bc-val::before{ margin-right: 6px; }
    .bc-budget::before{ content: "Budget: "; }
    .bc-voorspelling::before{ content: "Voorspelling: "; }
    .bc-verschil::before{ content: "Verschil: "; }
  }
  .note-card b{ color: var(--paper-dim); }

  footer{ margin-top: 30px; font-size: 12.5px; color: var(--muted); line-height: 1.6; border-top: 1px solid var(--rule); padding-top: 18px; }
  footer b{ color: var(--paper-dim); }
</style>

function txForMonth(m){ return AMEX_ALL.filter(r => monthOf(r.date)===m && r.category!=='__PAYMENT__'); }
function totalForMonth(m){ return txForMonth(m).reduce((s,r)=>s+r.amount,0); }
function categoryTotals(m){
  const map={}; txForMonth(m).forEach(r=>{ map[r.category]=(map[r.category]||0)+r.amount; });
  return Object.entries(map).filter(([,v])=>v>0.001).sort((a,b)=>b[1]-a[1]);
}
function renderDonutCSS(cats, total){
  let acc=0;
  const stops = cats.map(([name,val])=>{
    const start=acc/total*360; acc+=val; const end=acc/total*360;
    return `${CATEGORY_COLORS[name]||'var(--c-overig)'} ${start}deg ${end}deg`;
  }).join(', ');
  return `background: conic-gradient(${stops});`;
}
function renderTrendSVG(){
  const w=900,h=170,pad=10;
  const totals = MONTHS.map(totalForMonth);
  const max = Math.max(...totals)*1.15;
  const stepX=(w-pad*2)/(MONTHS.length-1);
  const pts = totals.map((t,i)=>{ const x=pad+i*stepX; const y=h-pad-(t/max)*(h-pad*2); return [x,y]; });
  const linePath = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const circles = pts.map((p,i)=>{
    const active = MONTHS[i]===selectedMonth;
    return `<circle cx="${p[0]}" cy="${p[1]}" r="${active?5:3}" fill="${active?'#7fb8c4':'#5f7f99'}" stroke="var(--panel)" stroke-width="2"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5f7f99" stop-opacity="0.35"/><stop offset="100%" stop-color="#5f7f99" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#areaGrad)"/>
    <path d="${linePath}" fill="none" stroke="#5f7f99" stroke-width="2"/>${circles}</svg>`;
}

  const amex = AMEX_PERIOD.filter(r=>r.category!=='__PAYMENT__').map(r=>({...r, amount:-r.amount, source:'AMEX'}));

/* ---------- Begroting (Numbers, augustus 2026 = standaardmaand) & meerjarenprognose ---------- */
const FORECAST_MONTHS = [
  {m:"aug",jaar:2026}, {m:"sep",jaar:2026}, {m:"okt",jaar:2026}, {m:"nov",jaar:2026},
  {m:"dec",jaar:2026}, {m:"jan",jaar:2027}, {m:"feb",jaar:2027}, {m:"mrt",jaar:2027},
  {m:"apr",jaar:2027}, {m:"mei",jaar:2027}, {m:"jun",jaar:2027}, {m:"jul",jaar:2027}
];
const MAAND_LABEL = {jan:"Jan",feb:"Feb",mrt:"Mrt",apr:"Apr",mei:"Mei",jun:"Jun",jul:"Jul",aug:"Aug",sep:"Sep",okt:"Okt",nov:"Nov",dec:"Dec"};
const ENERGIE_VOORSPELLING = {jan:560.83,feb:504.68,mrt:439.49,apr:287.89,mei:221.55,jun:180.10,
  jul:96.87,aug:139.19,sep:227.42,okt:342.79,nov:482.18,dec:489.55};
const ENEL_MAANDEN = new Set(["feb","apr","jun","aug","okt","dec"]);
const IMU_MAANDEN = new Set(["mei","nov"]);
const BKW_VAST_EXCL_ENERGIE = 2597.40+896.53+163.33+26.00+94.99+28.63+2.00+4.65; // hypotheek, auto, verzekeringen, water, telecom, media, goede doelen, bankkosten
const CASA_LENING = 415.28;
const ENEL_BEDRAG = 61.00;
const IMU_BEDRAG = 166.60;
const ROB_BASIS = 11154.92;
const ROB_MEI = 18991.18;   // incl. vakantiegeld
const ROB_DEC = 26154.23;   // incl. eindejaarsuitkering
const LINDY_BASIS = 2398.03; // SARO, sinds mei 2026
const BELASTING_STRUCTUREEL = 313.00; // voorlopige teruggaaf, maandelijks

function buildForecast(){
  return FORECAST_MONTHS.map(({m,jaar})=>{
    const rob = m==="mei" ? ROB_MEI : (m==="dec" ? ROB_DEC : ROB_BASIS);
    const inkomen = rob + LINDY_BASIS + BELASTING_STRUCTUREEL;
    const energie = ENERGIE_VOORSPELLING[m];
    const bkw = BKW_VAST_EXCL_ENERGIE + energie;
    const enel = ENEL_MAANDEN.has(m) ? ENEL_BEDRAG : 0;
    const imu = IMU_MAANDEN.has(m) ? IMU_BEDRAG : 0;
    const casa = CASA_LENING + enel + imu;
    const netto = inkomen - bkw - casa;
    const bijzonderheden = [];
    if(m==="mei") bijzonderheden.push("Rob: vakantiegeld");
    if(m==="dec") bijzonderheden.push("Rob: eindejaarsuitkering");
    if(enel) bijzonderheden.push("Enel (2-mnd)");
    if(imu) bijzonderheden.push("IMU");
    return {m, jaar, inkomen, bkw, casa, netto, energie, bijzonderheden};
  });
}

function renderBudgetView(){
  const rows = buildForecast();
  const jaarInkomen = rows.reduce((s,r)=>s+r.inkomen,0);

  const w=900,h=170,pad=10;
  const max = Math.max(...rows.map(r=>r.netto))*1.1;
  const min = Math.min(0, Math.min(...rows.map(r=>r.netto))*1.1);
  const range = max-min;
  const stepX=(w-pad*2)/(rows.length-1);
  const pts = rows.map((r,i)=>{ const x=pad+i*stepX; const y=h-pad-((r.netto-min)/range)*(h-pad*2); return [x,y]; });
  const linePath = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');

async function setOverrideByKey(key, newCat){
  if(newCat && newCat.trim()){
    categoryOverrides[key] = newCat.trim();
    render();
    try{
      const res = await fetch(SB_URL, { method:'POST', headers:{...SB_HEADERS, 'Prefer':'resolution=merge-duplicates,return=minimal'}, body: JSON.stringify([{txkey:key, categorie:newCat.trim()}]) });
      if(!res.ok) throw new Error('sb '+res.status);
      syncStatus = 'ok';
    }catch(e){ syncStatus = 'offline'; render(); }
  } else {
    delete categoryOverrides[key];
    render();
    try{
      const res = await fetch(SB_URL+'?txkey=eq.'+encodeURIComponent(key), { method:'DELETE', headers: SB_HEADERS });
      if(!res.ok) throw new Error('sb '+res.status);
      syncStatus = 'ok';
    }catch(e){ syncStatus = 'offline'; render(); }
  }
}
function promptEditCategoryByKey(key, huidigeCat){
  const lijst = ALLE_CATEGORIEEN.join(', ');
  const parts = key.split('|');
  const naam = parts[1] || key;
  const nieuw = window.prompt('Categorie voor "' + naam + '"\n\nKies uit: ' + lijst, huidigeCat);
  if(nieuw !== null) setOverrideByKey(key, nieuw);
}


function buildCombinedJul(){
  const rabo = RABO_TX_JUL.map(r=>({...r, category: effectiveCategory(r), _orig: r, source:'RABO'}));
  const ing = ING_TX_JUL.map(r=>({...r, category: effectiveCategory(r), _orig: r, source:'ING'}));
  const amex = AMEX_TX_JUL.map(r=>({...r, amount:-r.amount, category: effectiveCategory(r), _orig: r, source:'AMEX'}));
  return [...rabo, ...ing, ...amex];
}

function renderLopendeMaandView(){

  const reizenRegels = all.filter(r=>r.category==='Reizen');
  const casaProjectRegels = all.filter(r=>r.category==='Casa 3S (project)');

  const dagelijks = spend.filter(r=>!vasteLastenSet.has(r.category));
  const vastTotaal = vast.reduce((s,r)=>s+r.amount,0);
  const dagelijksTotaal = dagelijks.reduce((s,r)=>s+r.amount,0);
  const reizenTotaal = reizenRegels.reduce((s,r)=>s+r.amount,0);
  const casaProjectTotaal = casaProjectRegels.reduce((s,r)=>s+r.amount,0);

  // Sparen: de werkelijke overboeking naar Casa Tre Sorelle dekt in één keer zowel Rob's als Lindy's bijdrage — niet los optellen.
  const sparenTransfer = -sparenRegels.filter(r=>r.vendor.includes('Casa Tre Sorelle')).reduce((s,r)=>s+r.amount,0);
  const sparenVelthoven = 0; // gepauzeerd
  const sparenStructureel = sparenTransfer + sparenVelthoven;

  const netto = incomeTotal + vastTotaal + dagelijksTotaal - sparenStructureel;

  function donutFor(rows){
    const map={};
    rows.forEach(r=>{ map[r.category]=(map[r.category]||0)+r.amount; });
    const sorted = Object.entries(map).map(([k,v])=>[k,Math.abs(v)]).sort((a,b)=>b[1]-a[1]);
    const total = sorted.reduce((s,[,v])=>s+v,0);
    return {sorted, total};
  }
  const vastDonut = donutFor(vast);
  const dagDonut = donutFor(dagelijks);

  function matchesFilterJul(r){
    if(!selectedFilter) return true;
    if(selectedFilter.type==='category') return r.category===selectedFilter.value;
    if(selectedFilter.value==='INKOMEN') return JUL_INCOME_CATS.includes(r.category);
    if(selectedFilter.value==='VAST') return vasteLastenSet.has(r.category) && !JUL_INCOME_CATS.includes(r.category) && r.category!=='Sparen';
    if(selectedFilter.value==='DAGELIJKS') return !vasteLastenSet.has(r.category) && !JUL_INCOME_CATS.includes(r.category) && !JUL_INTERN_CATS.includes(r.category) && r.category!=='Sparen' && r.category!=='Reizen' && r.category!=='Casa 3S (project)';
    if(selectedFilter.value==='CASA_PROJECT') return r.category==='Casa 3S (project)';
    if(selectedFilter.value==='SPAREN') return r.category==='Sparen' && r.vendor.includes('Casa Tre Sorelle');
    if(selectedFilter.value==='REIZEN') return r.category==='Reizen';
    return r.source===selectedFilter.value;
  }
  const ledgerRowsAll = all.filter(r=>!JUL_INTERN_CATS.includes(r.category)).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const ledgerRows = ledgerRowsAll.filter(matchesFilterJul);
  const srcColor = {RABO:'var(--brass)', ING:'var(--teal)', AMEX:'var(--rose)'};
  const filterChip = selectedFilter ? `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;">
      <span style="font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--muted);">Gefilterd op:</span>
      <span class="lr-tag" style="background:var(--brass);">${selectedFilter.value}</span>

    </div>` : '';

  function donutCard(title, donut, filterVal){
    return `<div class="card">
      <div class="card-label" data-filter-src="${filterVal}" style="cursor:pointer;">${title} — tik voor detail</div>

        <div class="donut" style="${renderDonutCSS(donut.sorted, donut.total)}">

        </div>

  const incomeDonut = donutFor(income);

      <select class="lr-tag-select" data-edit-cat="${txKeyAttr}" style="background:${CATEGORY_COLORS[t.category]||'var(--c-overig)'};"${overridden}>

  }

  function accordionTile(label, bedrag, sub, expandKey, cls, donut, rows){
    const isOpen = volgendeExpand===expandKey;

      const matching = (expandKey==='sparen') ? rows.slice() : rows.filter(r=>r.category===catName);
      matching.sort((a,b)=>b.date.localeCompare(a.date));
      catDetail = `<div style="margin-top:14px;padding-top:14px;border-top:1px dashed var(--rule);">

    }
    const detail = isOpen ? `<div class="card" style="grid-column: 1 / -1;">

      <div class="donut-wrap">

          <div class="donut-hole"><span>totaal</span><b>${fmt((expandKey==='inkomen'||expandKey==='sparen')?donut.total:-donut.total).replace('€','€ ')}</b></div>

            const catKey = expandKey+'|'+name;
            const active = categoryExpand===catKey;
            return `<li data-cat-toggle="${catKey}" style="cursor:pointer;${active?'font-weight:600;':''}"><span class="dot" style="background:${CATEGORY_COLORS[name]||'var(--c-overig)'}"></span><span class="name">${name}${active?' ▾':''}</span><span class="amt">${fmt((expandKey==='inkomen'||expandKey==='sparen')?val:-val)}</span></li>`;

      </div>
      ${catDetail}
    </div>` : '';
    return `<div class="card" data-expand="${expandKey}" style="cursor:pointer;">
        <div class="card-label">${label}${isOpen?' ▾':' ▸'}</div>
        <div class="stat-figure ${cls}">${bedrag}</div>
        <div class="stat-sub">${sub}</div>
      </div>${detail}`;
  }

  return `
    <div class="note-card card">
      <b>25 juni – 24 juli 2026</b> — dag 22 van 30. Werkelijke cijfers Rabo, ING én AMEX t/m 16 juli.

    </div>
    <div class="hero4">

          ${vendorSorted.slice(0,8).map(([name,val],i)=>`<li><span class="dot" style="background:${['#7fb8c4','#5f7f99','#7c93c4','#c98f5e','#a68bc9','#7fae8a','#cfa963','#c17c9c'][i%8]}"></span><span class="name">${name}</span><span class="amt">${fmt(-val)}</span></li>`).join('')}
        </ul>
      </div>
    </div>
    <div class="card ledger-card">
      <div class="card-label"><span>Alle projecttransacties</span><span class="ledger-count">${project.length} regels</span></div>
      <ul class="ledger-list">
        ${project.map(t=>{
          const d=new Date(t.date); const dd=String(d.getUTCDate()).padStart(2,'0'); const mm=String(d.getUTCMonth()+1).padStart(2,'0');
          const txKeyAttr = txKey(t._orig).replace(/"/g,'&quot;');
          const overridden = categoryOverrides[txKey(t._orig)] ? ' title="handmatig aangepast"' : '';
          return `<li class="ledger-row">
            <span class="lr-date">${dd}-${mm}</span>
            <span class="lr-src" style="color:${srcColor[t.source]};border-color:${srcColor[t.source]}">${t.source}</span>
            <select class="lr-tag-select" data-edit-cat="${txKeyAttr}" style="background:${CATEGORY_COLORS['Casa 3S (project)']||'var(--c-italie)'};"${overridden}>
              ${ALLE_CATEGORIEEN.map(c=>`<option value="${c}" ${c==='Casa 3S (project)'?'selected':''}>${c}</option>`).join('')}
            </select>
            <span class="lr-vendor">${t.vendor}</span><span class="lr-leader"></span>
            <span class="lr-amt">${fmt(t.amount)}</span></li>`;
        }).join('')}
      </ul>
    </div>
    <footer>Structurele Casa 3S-lasten (lening, Enel, IMU) staan bij Vaste Lasten. Alleen eenmalige verbouwings-/aannemerskosten staan hier.</footer>
  `;
}

/* ---------- Volgende maand: bijstelbare voorspelling (25 juli - 24 augustus) ---------- */
function renderVolgendeMaandView(){
  const ROB_BASIS=11154.92, LINDY=2398.03, BELASTING=313.00, ROB_SPAREN=2000.00;
  const INKOMEN_COMPONENTEN = {"Salaris": ROB_BASIS+LINDY, "Belastingteruggave": BELASTING, "Overig inkomen": 0};
  const SALARIS_SUBCOMPONENTEN = {"Rob — LVNL (basis)": ROB_BASIS, "Lindy — SARO": LINDY};
  const SPAREN_COMPONENTEN = {"Rob — vast": ROB_SPAREN, "Lindy — volledig salaris": LINDY, "Deurwaarder (Velthoven)": 0};
  const VAST_COMPONENTEN = {
    "Hypotheek": 2597.40, "Auto": 896.53, "Verzekeringen": 163.33+347.20,
    "Nutsvoorzieningen": 26.00+139.19, "Telecom": 94.99, "Abonnementen": 28.63+39.30+89.78,
    "Goede doelen": 2.00, "Bankkosten": 4.65+4.53+20.00, "Casa 3S": 415.28+61.00,
    "Medisch": 157.92, "Vakbond": 25.60, "Muziek": 159.88, "Paardrijden": 325.00+143.18, "Zakelijk": 117.45,
  };
  const vastTotaal = Object.values(VAST_COMPONENTEN).reduce((a,b)=>a+b,0);
  const DAGELIJKS_COMPONENTEN = {
    "Boodschappen": 1305.91, "Eten & drinken": 286.86, "Kleding": 251.12,
    "Shopping": 50.65, "Wonen": 151.43, "Autokosten": 37.90, "Parkeren": 18.44,
    "Verzorging": 23.77, "Overig": 47.26, "Hobby": 61.56, "Entertainment": 16.69,
  };
  const variabel = Object.values(DAGELIJKS_COMPONENTEN).reduce((a,b)=>a+b,0); // = 2.251,59 — gemiddelde over 7-8 mnd echte ING/AMEX-data, na categorie-correcties
  const inkomenTotaal = Object.values(INKOMEN_COMPONENTEN).reduce((a,b)=>a+b,0);
  const sparenBasis = ROB_SPAREN+LINDY;
  const netto = inkomenTotaal - sparenBasis - vastTotaal - variabel;

  // Budget (jouw Excel) vs Voorspelling (patroonherkenning) — voor de categorieën waar we allebei hebben
  const BUDGET_VS_VOORSPELLING = [
    ["Boodschappen", 1500.00, 1192.84],
    ["Kleding", 600.00, 273.04],
    ["Sport / Paardrijden", 495.00, 468.18],
    ["Verzekering zorg", 349.55, 347.20],
    ["Media / Abonnementen", 133.65, 157.71],
    ["Muziek", 134.79, 159.88],
    ["Bonden", 27.94, 25.60],
    ["Bankkosten (ING)", 4.60, 4.53],
    ["Auto brandstof + parkeren", 150.00, 56.34],
    ["Luxe + Extra's", 750.00, 575.25],
  ];
  const budgetSubtotaal = BUDGET_VS_VOORSPELLING.reduce((s,r)=>s+r[1],0);
  const voorspellingSubtotaal = BUDGET_VS_VOORSPELLING.reduce((s,r)=>s+r[2],0);
  const nettoBudget = netto - (budgetSubtotaal - voorspellingSubtotaal);

  function donutFor(componenten){
    const sorted = Object.entries(componenten).filter(([,v])=>v>0.001).sort((a,b)=>b[1]-a[1]);
    const total = sorted.reduce((s,[,v])=>s+v,0);
    return {sorted, total};
  }
  const SUB_COMPONENTEN_MAP = {"Salaris": SALARIS_SUBCOMPONENTEN};
  function expandCard(titel, componenten, expandKey){
    const d = donutFor(componenten);
    return `<div class="card" style="grid-column: 1 / -1;">
      <div class="card-label">${titel} — samenstelling (voorspelling)</div>
      <div class="donut-wrap">
        <div class="donut" style="${renderDonutCSS(d.sorted, d.total)}">
          <div class="donut-hole"><span>totaal</span><b>${fmt(d.total).replace('€','€ ')}</b></div>
        </div>
        <ul class="legend">
          ${d.sorted.map(([name,val])=>{
            const hasSub = !!SUB_COMPONENTEN_MAP[name];
            const catKey = expandKey+'|'+name;
            const active = categoryExpand===catKey;
            return `<li${hasSub?` data-cat-toggle="${catKey}" style="cursor:pointer;${active?'font-weight:600;':''}"`:''}><span class="dot" style="background:${CATEGORY_COLORS[name]||'var(--c-overig)'}"></span><span class="name">${name}${hasSub?(active?' ▾':' ▸'):''}</span><span class="amt">${fmt(val)}</span></li>`;
          }).join('')}
        </ul>
      </div>
      ${(()=>{
        if(!categoryExpand || !categoryExpand.startsWith(expandKey+'|')) return '';
        const catName = categoryExpand.slice(expandKey.length+1);
        const sub = SUB_COMPONENTEN_MAP[catName];
        if(!sub) return '';
        const sd = donutFor(sub);
        return `<div style="margin-top:14px;padding-top:14px;border-top:1px dashed var(--rule);">
          <div class="card-label">${catName} — uitsplitsing</div>
          <ul class="legend">
            ${sd.sorted.map(([name,val])=>`<li><span class="dot" style="background:${CATEGORY_COLORS[name]||'var(--c-overig)'}"></span><span class="name">${name}</span><span class="amt">${fmt(val)}</span></li>`).join('')}
          </ul>
        </div>`;
      })()}
    </div>`;
  }

  function tile(label, bedrag, sub, expandKey, cls){
    const isOpen = volgendeExpand===expandKey;
    const map = {inkomen:INKOMEN_COMPONENTEN, vast:VAST_COMPONENTEN, dagelijks:DAGELIJKS_COMPONENTEN, sparen:SPAREN_COMPONENTEN};
    const detail = isOpen ? expandCard(label, map[expandKey], expandKey) : '';
    return `<div class="card" data-expand="${expandKey}" style="cursor:pointer;">
        <div class="card-label">${label}${isOpen?' ▾':' ▸'}</div>
        <div class="stat-figure ${cls}">${bedrag}</div>
        <div class="stat-sub">${sub}</div>
      </div>${detail}`;
  }

  return `
    <div class="note-card card">
      <b>25 juli – 24 augustus 2026</b> — voorspelling op basis van de patronen die we hebben vastgesteld. Bij de eerste echte cijfers (Rabo-PDF / ING-CSV) stellen we 'm bij.
      Sparen is een vaste eerste afspraak (niet het restant): <b>Rob €2.000 + Lindy's volledige salaris</b>, plus wat er aan het einde van de maand op ING overblijft (open, geen vaste schatting).
      <br><br><i>Tik op een tegel voor de samenstelling — nog een keer tikken klapt 'm weer dicht.</i>
    </div>
    <div class="hero4">
      ${tile('Inkomen', fmt(inkomenTotaal), 'Rob + Lindy + belastingteruggave + deurwaarder (€0)', 'inkomen', 'pos')}
      ${tile('Vaste lasten', fmt(-vastTotaal), 'Bakkersparkweg + Casa 3S + ING + AMEX', 'vast', 'neg')}
      ${tile('Dagelijks', fmt(-variabel), 'gem. 7-8 mnd echte data', 'dagelijks', 'neg')}
      ${tile('Sparen', fmt(sparenBasis), 'Rob €2.000 + Lindy volledig — vaste eerste afspraak', 'sparen', 'pos')}
      <div class="card">
        <div class="card-label">Bestedingsruimte (voorspelling)</div>
        <div class="stat-figure ${netto>=0?'pos':'neg'}">${fmt(netto)}</div>
        <div class="stat-sub">o.b.v. patroonherkenning uit 7-8 mnd data</div>
      </div>
      <div class="card">
        <div class="card-label">Bestedingsruimte (budget)</div>
        <div class="stat-figure ${nettoBudget>=0?'pos':'neg'}">${fmt(nettoBudget)}</div>
        <div class="stat-sub">o.b.v. jouw Excel-budgetten</div>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Budget vs. voorspelling — per categorie</div>
      <div class="budget-compare-header">
        <span></span><span>Budget</span><span>Voorspelling</span><span>Verschil</span>
      </div>
      ${BUDGET_VS_VOORSPELLING.map(([naam,b,v])=>{
        const verschil = v-b;
        const kleur = verschil>5?'var(--rose)':(verschil<-5?'var(--teal)':'var(--muted)');
        return `<div class="budget-compare-row">
          <span class="bc-naam">${naam}</span>
          <span class="bc-val bc-budget">${fmt(b)}</span>
          <span class="bc-val bc-voorspelling">${fmt(v)}</span>
          <span class="bc-val bc-verschil" style="color:${kleur}">${verschil>0?'+':''}${fmt(verschil)}</span>
        </div>`;
      }).join('')}
      <div class="budget-compare-row" style="font-weight:600;border-top:1px solid var(--rule);margin-top:6px;padding-top:10px;">
        <span class="bc-naam">Totaal</span>
        <span class="bc-val bc-budget">${fmt(budgetSubtotaal)}</span>
        <span class="bc-val bc-voorspelling">${fmt(voorspellingSubtotaal)}</span>
        <span class="bc-val bc-verschil">${fmt(voorspellingSubtotaal-budgetSubtotaal)}</span>
      </div>
    </div>
    <div class="note-card card">
      <b>Budget vs. voorspelling:</b> het budget is wat je zelf hebt vastgelegd in je Excel; de voorspelling leert van alle data die we tot nu toe hebben en wordt scherper naarmate er meer maanden bijkomen — totdat er een keer een uitschieter is (bijv. veel kopen in één maand). Goed moment om 1x per jaar te checken of het budget zelf nog klopt met de realisatie.
    </div>
    <footer>Dagelijks is gebaseerd op het gemiddelde van 7-8 maanden echte ING/AMEX-data (na categorie-correcties), niet meer op een losse schatting. Enel valt in augustus (even maand); IMU niet (mei/november). Zodra de echte augustus-cijfers binnen zijn, wordt dit de "Lopende maand"-tab.</footer>
  `;
}

/* ---------- Vooruitblik lange termijn: vermogensopbouw ---------- */
function renderVermogenView(){
  const START = SPAAR_POTJES;
  const startTotaal = Object.values(START).reduce((a,b)=>a+b,0);
  const ROB_SPAREN=2000, LINDY=2398.03;
  const ROB_MEI_EXTRA = 18991.18-11154.92;
  const ROB_DEC_EXTRA = 26154.23-11154.92;
  const maandBasis = ROB_SPAREN+LINDY;

  const jaren = [2026,2027,2028,2029,2030];
  let lopend = startTotaal;
  const rows = jaren.map(j=>{
    const jaarSparen = maandBasis*12 + ROB_MEI_EXTRA + ROB_DEC_EXTRA;
    lopend += jaarSparen;
    return {jaar:j, bijgekomen:jaarSparen, totaal:lopend};
  });

  const w=900,h=170,pad=10;
  const max = Math.max(...rows.map(r=>r.totaal))*1.05;
  const min = startTotaal*0.95;
  const stepX=(w-pad*2)/(rows.length);
  const allPts = [startTotaal, ...rows.map(r=>r.totaal)];
  const pts = allPts.map((v,i)=>{ const x=pad+i*stepX; const y=h-pad-((v-min)/(max-min))*(h-pad*2); return [x,y]; });
  const linePath = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const circles = pts.map(p=>`<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="#7fb8c4" stroke="var(--panel)" stroke-width="2"/>`).join('');
  const svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="vGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7fb8c4" stop-opacity="0.3"/><stop offset="100%" stop-color="#7fb8c4" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#vGrad)"/><path d="${linePath}" fill="none" stroke="#7fb8c4" stroke-width="2"/>${circles}</svg>`;

  return `
    <div class="note-card card">
      Startpunt: huidige potjes op de Casa-spaarrekening. Jaarlijkse groei = <b>Rob €2.000/mnd + Lindy's volledige salaris</b>, plus Rob's extra salaris in mei (vakantiegeld) en december (13e maand) — die gaan <b>volledig</b> naar sparen, niet naar het huishoudbudget.
      <b>Bewust niet meegenomen:</b> Velthoven (nu gepauzeerd), het open ING-restje aan het einde van de maand, en onttrekkingen voor reizen/verbouwing/Japan — dit is dus een ondergrens, geen volledige prognose.
    </div>
    <div class="hero4">
      <div class="card">
        <div class="card-label">Startvermogen (nu)</div>
        <div class="stat-figure pos">${fmt(startTotaal)}</div>
        <div class="stat-sub">Casa 3S + Italië + Thailand + Kado</div>
      </div>
      <div class="card">
        <div class="card-label">Sparen/jaar (basis)</div>
        <div class="stat-figure pos">${fmt(maandBasis*12)}</div>
        <div class="stat-sub">Rob €2.000 + Lindy salaris, ×12</div>
      </div>
      <div class="card">
        <div class="card-label">+ Extra in mei &amp; dec</div>
        <div class="stat-figure pos">${fmt(ROB_MEI_EXTRA+ROB_DEC_EXTRA)}</div>
        <div class="stat-sub">Vakantiegeld + 13e maand, volledig naar sparen</div>
      </div>
      <div class="card">
        <div class="card-label">Vermogen eind 2030</div>
        <div class="stat-figure pos">${fmt(rows[rows.length-1].totaal)}</div>
        <div class="stat-sub">ondergrens — excl. Velthoven/ING-restje</div>
      </div>
    </div>
    <div class="card trend-card">
      <div class="card-label">Vermogensopbouw — 2026 t/m 2030 (ondergrens)</div>
      ${svg}
      <div class="trend-labels"><span>nu</span>${rows.map(r=>`<span>${r.jaar}</span>`).join('')}</div>
    </div>
    <div class="card ledger-card">
      <div class="card-label">Potjes (huidige stand)</div>
      <ul class="legend">
        ${Object.entries(START).map(([k,v])=>`<li><span class="dot" style="background:var(--c-sparen)"></span><span class="name">${k}</span><span class="amt">${fmt(v)}</span></li>`).join('')}
      </ul>
    </div>
    <footer>Japan staat nog op €0 — nieuw spaardoel, bedrag nog niet bepaald. Zodra Velthoven weer actief is (gem. €1.200-1.300/jaar, zwaarder in mei/dec) of er duidelijkheid is over het ING-restje, werken we die alsnog in.</footer>
  `;
}

function render(){
  const body = view==='afgelopen' ? renderLopendeMaandView() : (view==='reizen' ? renderReizenView() : (view==='casaproject' ? renderCasaProjectView() : (view==='volgende' ? renderVolgendeMaandView() : renderVermogenView())));
  document.getElementById('app').innerHTML = `
    <header>
      <div>
        <div class="brand-eyebrow">R. Bezemer — financieel overzicht</div>
        <h1>Uitgaven</h1>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <span style="font-family:'IBM Plex Mono',monospace; font-size:9.5px; color:${syncStatus==='ok'?'var(--muted)':'var(--rose)'};" title="${syncStatus==='ok'?'gesynchroniseerd met Supabase':'geen verbinding — wijzigingen zijn lokaal, sync opnieuw zodra je online bent'}">${syncStatus==='ok'?'● sync':'● offline'}</span>
        <button data-export-overrides="1" style="background:none;border:1px solid var(--rule);color:var(--muted);border-radius:4px;padding:6px 10px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;cursor:pointer;">⬇ Exporteer</button>
        <label style="background:none;border:1px solid var(--rule);color:var(--muted);border-radius:4px;padding:6px 10px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;cursor:pointer;">
          ⬆ Importeer
          <input type="file" accept=".json" data-import-overrides="1" style="display:none;">
        </label>
      </div>
    </header>
    <div class="view-toggle">
      <button class="view-btn ${view==='afgelopen'?'active':''}" data-view="afgelopen">Lopende maand</button>
      <button class="view-btn ${view==='volgende'?'active':''}" data-view="volgende">Volgende maand</button>
      <button class="view-btn ${view==='reizen'?'active':''}" data-view="reizen">Reizen</button>
      <button class="view-btn ${view==='casaproject'?'active':''}" data-view="casaproject">Casa 3S (project)</button>
      <button class="view-btn ${view==='vermogen'?'active':''}" data-view="vermogen">Vooruitblik (vermogen)</button>
    </div>
    ${body}
  `;
  document.querySelectorAll('.view-btn').forEach(b=>b.addEventListener('click',()=>{ view=b.dataset.view; selectedFilter=null; render(); }));
  document.querySelectorAll('.month-tab').forEach(b=>b.addEventListener('click',()=>{ selectedMonth=b.dataset.month; render(); }));
  document.querySelectorAll('[data-filter-cat]').forEach(el=>el.addEventListener('click',()=>{ selectedFilter={type:'category', value:el.dataset.filterCat}; render(); scrollToLedger(); }));
  document.querySelectorAll('[data-filter-src]').forEach(el=>el.addEventListener('click',()=>{ selectedFilter={type:'source', value:el.dataset.filterSrc}; render(); scrollToLedger(); }));
  document.querySelectorAll('[data-clear-filter]').forEach(el=>el.addEventListener('click',()=>{ selectedFilter=null; render(); }));
  document.querySelectorAll('[data-goto-view]').forEach(el=>el.addEventListener('click',()=>{ view=el.dataset.gotoView; selectedFilter=null; render(); }));
  document.querySelectorAll('[data-scroll-to]').forEach(el=>el.addEventListener('click',()=>{ scrollToSelector('#'+el.dataset.scrollTo); }));
  document.querySelectorAll('[data-expand]').forEach(el=>el.addEventListener('click',()=>{ volgendeExpand = (volgendeExpand===el.dataset.expand) ? null : el.dataset.expand; categoryExpand=null; render(); }));
  document.querySelectorAll('[data-cat-toggle]').forEach(el=>el.addEventListener('click',(e)=>{ e.stopPropagation(); categoryExpand = (categoryExpand===el.dataset.catToggle) ? null : el.dataset.catToggle; render(); }));
  const exportBtn = document.querySelector('[data-export-overrides]');
  if(exportBtn) exportBtn.addEventListener('click', exportOverrides);
  const importInput = document.querySelector('[data-import-overrides]');
  if(importInput) importInput.addEventListener('change', (e)=>{ if(e.target.files[0]) importOverrides(e.target.files[0]); });
  document.querySelectorAll('[data-edit-cat]').forEach(el=>el.addEventListener('change',(e)=>{ e.stopPropagation(); setOverrideByKey(el.dataset.editCat, el.value); }));
  document.querySelectorAll('[data-edit-cat]').forEach(el=>el.addEventListener('click',(e)=>e.stopPropagation()));
}
function scrollToLedger(){
  scrollToSelector('.ledger-card');
}
function scrollToSelector(sel){
  setTimeout(()=>{
    try{
      const el = document.querySelector(sel);
      if(el && el.scrollIntoView) el.scrollIntoView({behavior:'smooth', block:'start'});
    }catch(e){}
  }, 30);
}
function _unused_old(){}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible' && overridesLoaded) loadOverrides(); });
loadOverrides();
</script>
</body>
